<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Digital Zen | 1分間のリセット</title>
    <style>
        :root {
            --bg-color: #010409;
            --accent-color: #00f2ff;
            --text-main: #f0f6fc;
            --text-sub: #8b949e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            touch-action: none;
        }

        /* 背景のオーラ演出 */
        .ambient-glow {
            position: absolute;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, rgba(0, 242, 255, 0.04) 0%, transparent 70%);
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        #timer {
            font-size: 3.5rem;
            font-weight: 200;
            letter-spacing: -0.05em;
            margin-bottom: 5px;
            font-variant-numeric: tabular-nums;
        }

        #instruction {
            font-size: 1.2rem;
            font-weight: 300;
            height: 1.5em;
            margin-bottom: 50px;
            transition: all 0.6s ease;
            letter-spacing: 0.05em;
        }

        /* 呼吸ビジュアライザー */
        .visualizer {
            position: relative;
            width: 250px;
            height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #circle {
            width: 16px;
            height: 16px;
            background-color: var(--accent-color);
            border-radius: 50%;
            box-shadow: 
                0 0 30px var(--accent-color),
                0 0 60px rgba(0, 242, 255, 0.3);
            transform: scale(1);
            opacity: 0.3;
            will-change: transform, opacity;
        }

        /* 操作ボタン */
        .controls {
            margin-top: 60px;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 242, 255, 0.4);
            color: var(--accent-color);
            padding: 14px 45px;
            font-size: 1rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(8px);
            letter-spacing: 0.05em;
        }

        .btn:active {
            transform: scale(0.96);
            background: rgba(0, 242, 255, 0.1);
        }

        .btn.secondary {
            border-color: #30363d;
            color: #8b949e;
        }

        .hidden {
            display: none;
        }

        .helper-text {
            position: absolute;
            bottom: 40px;
            font-size: 0.8rem;
            color: #484f58;
            text-align: center;
            max-width: 80%;
            line-height: 1.6;
            transition: opacity 0.5s;
        }
    </style>
</head>
<body>

    <div class="ambient-glow"></div>

    <div class="container">
        <div id="timer">01:00</div>
        <div id="instruction">1分間で、自分を取り戻す</div>
        
        <div class="visualizer">
            <div id="circle"></div>
        </div>

        <div class="controls">
            <button id="start-btn" class="btn">今すぐ始める</button>
            <button id="stop-btn" class="btn secondary hidden">中断</button>
        </div>
    </div>


    <script>
        const SESSION_SECONDS = 60; // 1 minute
        const INHALE_MS = 4000;
        const EXHALE_MS = 6000; // 10s per breath cycle = 6 breaths/min

        let timeLeft = SESSION_SECONDS;
        let isRunning = false;
        let timerInterval = null;
        let breathTimeout = null;

        const timerEl = document.getElementById('timer');
        const instructionEl = document.getElementById('instruction');
        const circleEl = document.getElementById('circle');
        const startBtn = document.getElementById('start-btn');
        const stopBtn = document.getElementById('stop-btn');
        const helperEl = document.getElementById('helper');

        function formatTime(s) {
            const min = Math.floor(s / 60);
            const sec = s % 60;
            return `${min.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
        }

        function updateBreathing() {
            if (!isRunning) return;

            // 吸気 (4s)
            instructionEl.innerText = "鼻からゆっくり吸って";
            instructionEl.style.color = "var(--accent-color)";
            circleEl.style.transition = `transform ${INHALE_MS}ms cubic-bezier(0.4, 0, 0.2, 1), opacity ${INHALE_MS}ms ease`;
            circleEl.style.transform = "scale(15)";
            circleEl.style.opacity = "1";

            breathTimeout = setTimeout(() => {
                if (!isRunning) return;

                // 呼気 (6s)
                instructionEl.innerText = "口から細く長く吐いて";
                instructionEl.style.color = "var(--text-main)";
                circleEl.style.transition = `transform ${EXHALE_MS}ms cubic-bezier(0.4, 0, 0.2, 1), opacity ${EXHALE_MS}ms ease`;
                circleEl.style.transform = "scale(1)";
                circleEl.style.opacity = "0.2";

                breathTimeout = setTimeout(updateBreathing, EXHALE_MS);
            }, INHALE_MS);
        }

        function startSession() {
            isRunning = true;
            timeLeft = SESSION_SECONDS;
            timerEl.innerText = formatTime(timeLeft);
            
            startBtn.classList.add('hidden');
            stopBtn.classList.remove('hidden');
            helperEl.style.opacity = "0.1";

            updateBreathing();

            timerInterval = setInterval(() => {
                timeLeft--;
                timerEl.innerText = formatTime(timeLeft);

                if (timeLeft <= 0) {
                    endSession();
                }
            }, 1000);
        }

        function stopSession() {
            isRunning = false;
            clearInterval(timerInterval);
            clearTimeout(breathTimeout);
            
            startBtn.classList.remove('hidden');
            stopBtn.classList.add('hidden');
            helperEl.style.opacity = "1";

            instructionEl.innerText = "1分間で、自分を取り戻す";
            timerEl.innerText = formatTime(SESSION_SECONDS);
            circleEl.style.transition = "all 0.5s ease";
            circleEl.style.transform = "scale(1)";
            circleEl.style.opacity = "0.3";
        }

        function endSession() {
            isRunning = false;
            clearInterval(timerInterval);
            clearTimeout(breathTimeout);

            startBtn.classList.remove('hidden');
            stopBtn.classList.add('hidden');
            startBtn.innerText = "もう1回行う";
            
            instructionEl.innerText = "整いました";
            circleEl.style.transform = "scale(1)";
            circleEl.style.opacity = "0.3";
            helperEl.style.opacity = "1";
        }

        startBtn.addEventListener('click', startSession);
        stopBtn.addEventListener('click', stopSession);

        // iPhone Safari スクロール防止
        document.addEventListener('touchmove', (e) => {
            if (isRunning) e.preventDefault();
        }, { passive: false });
    </script>
</body>
</html>
