<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zen</title>
    <style>
        :root {
            --bg: #000000;
            --glow: #00f2ff;
            --text: #ffffff;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, system-ui, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            touch-action: none;
        }

        #timer {
            font-size: 3rem;
            font-weight: 200;
            margin-bottom: 20px;
            font-variant-numeric: tabular-nums;
            opacity: 0.8;
        }

        #state {
            font-size: 1.2rem;
            letter-spacing: 0.2em;
            height: 1.5em;
            margin-bottom: 60px;
            font-weight: 300;
        }

        .stage {
            position: relative;
            width: 250px;
            height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #dot {
            width: 12px;
            height: 12px;
            background: var(--glow);
            border-radius: 50%;
            box-shadow: 0 0 30px var(--glow), 0 0 60px rgba(0, 242, 255, 0.4);
            transform: scale(1);
            opacity: 0.3;
            will-change: transform, opacity;
        }

        .actions {
            margin-top: 80px;
        }

        .btn {
            background: none;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: var(--text);
            padding: 12px 40px;
            font-size: 0.9rem;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.4s;
            letter-spacing: 0.1em;
        }

        .btn:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.1);
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="timer">01:00</div>
    <div id="state">Ready</div>

    <div class="stage">
        <div id="dot"></div>
    </div>

    <div class="actions">
        <button id="main-btn" class="btn">START</button>
    </div>

    <script>
        const duration = 60;
        let left = duration;
        let active = false;
        let tInt, bOut;

        const elT = document.getElementById('timer');
        const elS = document.getElementById('state');
        const elD = document.getElementById('dot');
        const elB = document.getElementById('main-btn');

        const fmt = (s) => `00:${s.toString().padStart(2, '0')}`;

        function breath() {
            if (!active) return;

            // In (4s)
            elS.innerText = "吸う";
            elS.style.opacity = "1";
            elD.style.transition = "transform 4s cubic-bezier(0.4, 0, 0.2, 1), opacity 4s ease";
            elD.style.transform = "scale(18)";
            elD.style.opacity = "1";

            bOut = setTimeout(() => {
                if (!active) return;
                // Out (6s)
                elS.innerText = "吐く";
                elS.style.opacity = "0.6";
                elD.style.transition = "transform 6s cubic-bezier(0.4, 0, 0.2, 1), opacity 6s ease";
                elD.style.transform = "scale(1)";
                elD.style.opacity = "0.2";

                bOut = setTimeout(breath, 6000);
            }, 4000);
        }

        function toggle() {
            if (!active) {
                active = true;
                left = duration;
                elB.innerText = "STOP";
                elB.style.borderColor = "rgba(255,255,255,0.1)";
                elB.style.color = "#555";
                
                breath();
                tInt = setInterval(() => {
                    left--;
                    elT.innerText = fmt(left);
                    if (left <= 0) reset();
                }, 1000);
            } else {
                reset();
            }
        }

        function reset() {
            active = false;
            clearInterval(tInt);
            clearTimeout(bOut);
            elB.innerText = "START";
            elB.style.borderColor = "rgba(255,255,255,0.3)";
            elB.style.color = "#fff";
            elT.innerText = fmt(duration);
            elS.innerText = left <= 0 ? "Done" : "Ready";
            elD.style.transition = "all 0.5s ease";
            elD.style.transform = "scale(1)";
            elD.style.opacity = "0.3";
        }

        elB.onclick = toggle;
        document.addEventListener('touchmove', (e) => { if(active) e.preventDefault(); }, {passive:false});
    </script>
</body>
</html>
